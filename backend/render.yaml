services:
  - type: web
    name: ewaste-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DEFAULT_VENDOR_ID
        sync: false
      - key: PORT
        value: 5000
